# Compila la APK de Android en GitHub y la deja lista para descargar.
#
# Cómo usarlo:
#   1. En GitHub: Settings → Secrets and variables → Actions → New repository
#      secret. Crea estos secretos (los mismos valores que mobile/.env):
#        FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
#        FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID,
#        FIREBASE_APP_ID, GOOGLE_WEB_CLIENT_ID, GOOGLE_ANDROID_CLIENT_ID,
#        STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET
#   2. Pestaña Actions → "Compilar APK de Android" → Run workflow.
#   3. Al terminar, descarga la APK desde "Artifacts" en la página del run.
#
# Firma: la primera ejecución genera un keystore y lo publica como artefacto
# junto con su SHA-1 (necesaria para el cliente OAuth de Android de Google).
# Guarda ese keystore como secreto ANDROID_KEYSTORE_BASE64 para que todas las
# APKs futuras vayan firmadas igual (si cambia la firma, Android obliga a
# desinstalar la app anterior y Google Sign-In deja de funcionar).

name: Compilar APK de Android

on:
  workflow_dispatch:
  push:
    branches: [main, claude/fitness-tracking-app-j8l3ci]
    paths: ["mobile/**", ".github/workflows/android-apk.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        run: npm ci

      - name: Crear .env con los secretos del repositorio
        run: |
          cat > .env <<EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID=${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}
          EXPO_PUBLIC_STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}
          EOF

      - name: Avisar si faltan secretos
        env:
          WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
        run: |
          if [ -z "$WEB_CLIENT_ID" ] || [ -z "$ANDROID_CLIENT_ID" ]; then
            echo "::warning::Faltan GOOGLE_WEB_CLIENT_ID y/o GOOGLE_ANDROID_CLIENT_ID: la APK se compilará (la config de Firebase va incluida en el código), pero el botón de iniciar sesión con Google no funcionará hasta añadir esos secretos y recompilar."
          fi

      - name: Generar el proyecto nativo (expo prebuild)
        run: npx expo prebuild -p android --no-install

      - name: Preparar el keystore de firma
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/debug.keystore
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "Usando el keystore del secreto ANDROID_KEYSTORE_BASE64."
          else
            # El buildType release de la plantilla de Expo firma con el
            # keystore de debug, así que basta con sustituirlo por uno
            # propio generado con esas mismas credenciales.
            keytool -genkeypair -v \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=RCV Tracker, OU=Personal, O=RCV, L=ES, C=ES"
            echo "generated=true" >> "$GITHUB_OUTPUT"
          fi
          echo "## Huella del keystore (para el cliente OAuth Android de Google)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          keytool -list -v -keystore android/app/debug.keystore \
            -alias androiddebugkey -storepass android | grep -E "SHA1|SHA-1" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Exportar el keystore generado (guárdalo como secreto)
        if: steps.keystore.outputs.generated == 'true'
        run: |
          base64 -w0 android/app/debug.keystore > keystore.base64.txt
          {
            echo "## ⚠️ Keystore nuevo generado"
            echo "Descarga el artefacto **keystore** y guarda el contenido de keystore.base64.txt"
            echo "como secreto \`ANDROID_KEYSTORE_BASE64\` para que las próximas APKs se firmen igual."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compilar la APK (release)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Publicar la APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: rcv-tracker-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Publicar el keystore como artefacto
        if: steps.keystore.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: mobile/keystore.base64.txt
          retention-days: 7
