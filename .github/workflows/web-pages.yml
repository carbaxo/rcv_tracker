# Publica la web (Next.js exportada como estático) en GitHub Pages.
# URL resultante: https://carbaxo.github.io/rcv_tracker/
#
# Método: publica la carpeta exportada `out/` en la rama `gh-pages`. Es más
# robusto que el despliegue nativo por entorno y no depende de reglas de
# entorno. Para activarlo (una sola vez):
#   Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   → Branch: gh-pages / (root) → Save.
#
# Para que el login con Google funcione en esa URL, añade una vez el dominio
# carbaxo.github.io en Firebase: Authentication → Settings → Authorized domains.

name: Publicar web en GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - ".github/workflows/web-pages.yml"

# Necesario para que la acción pueda escribir en la rama gh-pages.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar la web (exportación estática)
        env:
          NEXT_PUBLIC_BASE_PATH: /rcv_tracker
        run: npx next build

      - name: Evitar el procesado de Jekyll (necesario para la carpeta _next)
        run: touch out/.nojekyll

      - name: Publicar en la rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
