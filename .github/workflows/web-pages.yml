# Publica la web (Next.js exportada como estático) en GitHub Pages.
# URL resultante: https://carbaxo.github.io/rcv_tracker/
#
# Para que el login con Google funcione en esa URL, añade una vez el dominio
# carbaxo.github.io en Firebase: Authentication → Settings → Authorized domains.

name: Publicar web en GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "tailwind.config.ts"
      - ".github/workflows/web-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Activar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar la web (exportación estática)
        env:
          NEXT_PUBLIC_BASE_PATH: /rcv_tracker
        run: npx next build

      - name: Subir la web compilada
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
